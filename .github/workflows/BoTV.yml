name: BoTV Daily Update

on:
  workflow_dispatch:
  watch:
    types: [started]
  schedule:
    - cron: '0 16,22,4,10 * * *' # 北京时间 00:00, 06:00, 12:00, 18:00

env:
  TZ: Asia/Shanghai

jobs:
  Update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: GetTime
      id: date
      run: echo "date=$(date +'%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_OUTPUT

    - name: Update Files
      run: |
        wget -q https://zubotv.ugreen.workers.dev -O Raw.txt

        echo '#EXTM3U x-tvg-url="https://itv.sspai.indevs.in/epg.xml.gz" catchup="append" catchup-source="?playseek=${(b)yyyyMMddHHmmss}-${(e)yyyyMMddHHmmss}"' > BoTV.m3u

        # 预设提示频道
        echo '#EXTINF:-1 tvg-id="温馨提示" tvg-name="温馨提示" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/温馨提示.png" group-title="🦧温馨提示",温馨提示' >> BoTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> BoTV.m3u
        echo '#EXTINF:-1 tvg-id="Cloudflare TV" tvg-name="Cloudflare TV" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/CloudflareTV.png" group-title="🦧温馨提示",Cloudflare TV' >> BoTV.m3u
        echo 'https://cloudflare.tv/hls/live.m3u8' >> BoTV.m3u

        # 处理 TXT 转 M3U
        awk -F ',' 'BEGIN {
            current_group="其他";
            # 在这里修正不一致的名字：map["直播源名字"]="图标库名字"
            map["CCTV1综合"]="CCTV1"; 
            map["CCTV5+赛事"]="CCTV5plus";
        } 
        {
            gsub(/\r/, "", $1); gsub(/\r/, "", $2);
            if ($2 == "#genre#") {
                current_group = $1;
            } else if ($1 != "" && $2 != "") {
                name = $1;
                url = $2;
                l_name = (name in map) ? map[name] : name;
                printf "#EXTINF:-1 tvg-id=\"%s\" tvg-name=\"%s\" tvg-logo=\"https://logo.jsdelivr.dpdns.org/tv/%s.png\" group-title=\"%s\",%s\n", name, name, l_name, current_group, name;
                print url;
            }
        }' Raw.txt >> BoTV.m3u

        # 生成同步 TXT
        awk '/^#EXTINF:/ {split($0, a, ","); name = a[2]; getline url; gsub(/\r/, "", name); gsub(/\r/, "", url); sub(/^ /, "", name); print name "," url;}' BoTV.m3u | awk '!seen[$0]++' > BoTV.txt
        rm -f Raw.txt

    - name: Commit Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add BoTV.m3u BoTV.txt README.md
        git commit -m "${{ steps.date.outputs.date }}" || exit 0
        git push
