name: BoTV Daily Update

on:
  workflow_dispatch:
  watch:
    types: [started]
  schedule:
    - cron: '0 16,22,4,10 * * *'

env:
  TZ: Asia/Shanghai

jobs:
  Update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: GetTime
      id: date
      run: echo "date=$(date +'%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_OUTPUT

    - name: Update Files
      run: |
        # 1. 下载原始 TXT 源文件
        wget -q https://zubotv.ugreen.workers.dev -O Raw.txt

        # 2. 写入自定义头部
        echo '#EXTM3U x-tvg-url="https://itv.sspai.indevs.in/epg.xml.gz" catchup="append" catchup-source="?playseek=${(b)yyyyMMddHHmmss}-${(e)yyyyMMddHHmmss}"' > BoTV.m3u

        # 3. 添加自定义温馨提示频道 (保持你原始的格式)
        echo '#EXTINF:-1 tvg-id="温馨提示" tvg-name="温馨提示" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/温馨提示.png" group-title="🦧温馨提示",温馨提示' >> BoTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> BoTV.m3u

        echo '#EXTINF:-1 tvg-id="谨防诈骗" tvg-name="谨防诈骗" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/谨防诈骗.png" group-title="🦧温馨提示",谨防诈骗' >> BoTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> BoTV.m3u

        echo '#EXTINF:-1 tvg-id="禁止蕉绿" tvg-name="禁止蕉绿" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/禁止蕉绿.png" group-title="🦧温馨提示",禁止蕉绿' >> BoTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> BoTV.m3u

        echo '#EXTINF:-1 tvg-id="Cloudflare TV" tvg-name="Cloudflare TV" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/CloudflareTV.png" group-title="🦧温馨提示",Cloudflare TV' >> BoTV.m3u
        echo 'https://cloudflare.tv/hls/live.m3u8' >> BoTV.m3u

        # 4. 转换 TXT 并匹配 Logo (格式完全参照你的示例)
        # 这里会过滤掉分类行 #genre# 和空行
        grep -vE '^$|#genre#' Raw.txt | awk -F ',' '{
            name = $1;
            url = $2;
            # 清理潜在的换行符
            gsub(/\r/, "", name);
            gsub(/\r/, "", url);
            
            # 严格匹配你的频道行格式：
            # #EXTINF:-1 tvg-id="名字" tvg-name="名字" tvg-logo="图标地址" group-title="分类",名字
            printf "#EXTINF:-1 tvg-id=\"%s\" tvg-name=\"%s\" tvg-logo=\"https://logo.jsdelivr.dpdns.org/tv/%s.png\" group-title=\"自动更新\",%s\n", name, name, name, name;
            print url;
        }' >> BoTV.m3u

        # 5. 生成 TXT 播放列表（供其他用途）
        awk '/^#EXTINF:/ {
            split($0, a, ",");
            name = a[2];
            getline url;
            gsub(/\r/, "", name);
            gsub(/\r/, "", url);
            sub(/^ /, "", name);
            print name "," url;
        } ' BoTV.m3u | awk '!seen[$0]++' > BoTV.txt

        rm -f Raw.txt

        # 6. 更新 README
        echo -e "# IPTV 自动更新\n\n### 更新于 ${{ steps.date.outputs.date }}\n\n### 包含格式:\n- [M3U播放列表](BoTV.m3u)\n- [TXT播放列表](BoTV.txt)" > README.md

    - name: Commit Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add BoTV.m3u BoTV.txt README.md
        git commit -m "${{ steps.date.outputs.date }}" || exit 0
        git push
