name: MiTV Daily Update（废弃）

on:
  workflow_dispatch:
  watch:
    types: [started]
  schedule:
    # 对应北京时间 00:00, 06:00, 12:00, 18:00
    - cron: '0 14,20,2,8 * * *'

env:
  TZ: Asia/Shanghai

jobs:
  Update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: GetTime
      id: date
      run: echo "date=$(date +'%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_OUTPUT

    - name: Update Files
      run: |
        # 1. 下载原始 TXT 源文件
        wget -q https://migu-tv.yuwell.workers.dev -O Raw.txt

        # 2. 初始化 M3U 头部
        echo '#EXTM3U x-tvg-url="https://itv.sspai.indevs.in/epg.xml.gz" catchup="append" catchup-source="?playseek=${(b)yyyyMMddHHmmss}-${(e)yyyyMMddHHmmss}"' > MiTV.m3u

        # 3. 添加固定提示频道 (手动设定分组)
        echo '#EXTINF:-1 tvg-id="温馨提示" tvg-name="温馨提示" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/温馨提示.png" group-title="🦧温馨提示",温馨提示' >> MiTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> MiTV.m3u

        echo '#EXTINF:-1 tvg-id="谨防诈骗" tvg-name="谨防诈骗" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/谨防诈骗.png" group-title="🦧温馨提示",谨防诈骗' >> MiTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> MiTV.m3u

        echo '#EXTINF:-1 tvg-id="禁止蕉绿" tvg-name="禁止蕉绿" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/禁止蕉绿.png" group-title="🦧温馨提示",禁止蕉绿' >> MiTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> MiTV.m3u

        echo '#EXTINF:-1 tvg-id="Cloudflare TV" tvg-name="Cloudflare TV" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/CloudflareTV.png" group-title="🦧温馨提示",Cloudflare TV' >> MiTV.m3u
        echo 'https://cloudflare.tv/hls/live.m3u8' >> MiTV.m3u

        # 4. 转换 TXT 并自动提取分组与匹配 Logo
        # 逻辑：遇到 #genre# 则更新当前分组名，否则输出频道信息
        awk -F ',' 'BEGIN {current_group="未分类"} 
        {
            gsub(/\r/, "", $1); 
            gsub(/\r/, "", $2);
            if ($2 == "#genre#") {
                current_group = $1;
            } else if ($1 != "" && $2 != "") {
                name = $1;
                url = $2;
                printf "#EXTINF:-1 tvg-id=\"%s\" tvg-name=\"%s\" tvg-logo=\"https://logo.jsdelivr.dpdns.org/tv/%s.png\" group-title=\"%s\",%s\n", name, name, name, current_group, name;
                print url;
            }
        }' Raw.txt >> MiTV.m3u

        # 5. 生成备份文本 (维持原有格式)
        awk '/^#EXTINF:/ {
            split($0, a, ",");
            name = a[2];
            getline url;
            gsub(/\r/, "", name);
            gsub(/\r/, "", url);
            sub(/^ /, "", name);
            print name "," url;
        }' MiTV.m3u | awk '!seen[$0]++' > MiTV.txt

        rm -f Raw.txt

    - name: Commit Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add MiTV.m3u MiTV.txt README.md
        git commit -m "${{ steps.date.outputs.date }}" || exit 0
        git push
