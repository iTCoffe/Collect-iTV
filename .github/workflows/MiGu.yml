name: update咪咕

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: 安装Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'
      
      - name: 设置时区
        run: sudo timedatectl set-timezone 'Asia/Shanghai'
      
      - name: 获取当前时间
        id: date
        run: echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
      
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
      
      - name: 执行MIGU更新脚本
        run: |
          python MIGU.py
          
          # 生成最终M3U
          echo '#EXTM3U x-tvg-url="https://itv.sspai.indevs.in/epg.xml" catchup="append" catchup-source="?playseek=$${yyyyMMddHHmmss}-$${yyyyMMddHHmmss}"' >MiGu.m3u
          
          # 添加自定义提示 (温馨提示)
          echo '#EXTINF:-1 tvg-id="温馨提示" tvg-name="温馨提示" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/温馨提示.png" group-title="🦧温馨提示",温馨提示' >>MiGu.m3u
          echo 'https://cloudflare.tv/hls/live.m3u8' >>MiGu.m3u
          
          # 添加新增提示 (谨防诈骗)
          echo '#EXTINF:-1 tvg-id="谨防诈骗" tvg-name="谨防诈骗" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/谨防诈骗.png" group-title="🦧温馨提示",谨防诈骗' >>MiGu.m3u
          echo 'https://cloudflare.tv/hls/live.m3u8' >>MiGu.m3u
          
          # 添加新增提示 (禁止蕉绿)
          echo '#EXTINF:-1 tvg-id="禁止蕉绿" tvg-name="禁止蕉绿" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/禁止蕉绿.png" group-title="🦧温馨提示",禁止蕉绿' >>MiGu.m3u
          echo 'https://cloudflare.tv/hls/live.m3u8' >>MiGu.m3u
          
          # 合并源文件
          cat CCTV.m3u CNTV.m3u >>MiGu.m3u
          
          # 生成TXT播放列表
          awk '/^#EXTINF:/ {
              split($0, a, ",");
              name = a[2];
              getline url;
              gsub(/\r/, "", name);
              gsub(/\r/, "", url);
              sub(/^ /, "", name);
              print name "," url;
          }' MiGu.m3u | awk '!seen[$0]++' > MiGu.txt
          
          # 清理临时文件
          rm -f Base.m3u CCTV.m3u CNTV.m3u
          
          # 更新README
          echo -e "# IPTV 自动更新\n\n### 更新于 ${{ steps.date.outputs.date }}\n\n### 包含格式:\n- [M3U播放列表](MiGu.m3u)（MiGu.M3U）\n- [TXT播放列表](MiGu.txt)（MiGu.TXT）" > README.md
      
      - name: Commit Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加文件
          git add MiGu.m3u MiGu.txt README.md
          
          # 提交更改
          git commit -m "Update IPTV playlist - ${{ steps.date.outputs.date }}"
      
      - name: Push Update
        run: git push
