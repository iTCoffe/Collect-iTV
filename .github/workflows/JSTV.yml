name: JSTV Daily Update

on:
  workflow_dispatch:
  watch:
    types: [started]
  schedule:
    - cron: '12 */5 * * *'

env:
  TZ: Asia/Shanghai

jobs:
  Update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: GetTime
      id: date
      run: echo "date=$(date +'%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_OUTPUT

    - name: Download and Generate m3u & txt
      run: |
        export LC_ALL=C.UTF-8

        # 定义三个源（移动、电信、联通）
        declare -A sources=(
          ["js-cmcc"]="https://raw.githubusercontent.com/chen-yixin/jiangsu-iptv/main/js-cmcc.m3u"
          ["js-ctcc"]="https://raw.githubusercontent.com/chen-yixin/jiangsu-iptv/main/js-ctcc.m3u"
          ["js-cucc"]="https://raw.githubusercontent.com/chen-yixin/jiangsu-iptv/main/js-cucc.m3u"
        )

        for prefix in "${!sources[@]}"; do
          url="${sources[$prefix]}"
          m3u_file="${prefix}.m3u"
          txt_file="${prefix}.txt"

          echo "下载 $m3u_file"
          wget -q "$url" -O "$m3u_file.tmp"
          tr -d '\r' < "$m3u_file.tmp" > "$m3u_file"
          rm "$m3u_file.tmp"

          echo "生成 $txt_file"
          awk -F ',' '
            /^#EXTINF:/ {
                sub(/^#EXTINF:-1 [^,]+,/, "", $0);
                name=$0;
                getline url;
                gsub(/[ \r]/, "", name);
                gsub(/\r/, "", url);
                if (name != "" && url != "") {
                    print name "," url;
                }
            }
          ' "$m3u_file" | awk '!c[$0]++' > "$txt_file"
        done

    - name: Generate README
      run: |
        cat > README.md << EOF
# 江苏IPTV 各运营商直播源

### 更新于 ${{ steps.date.outputs.date }}

#### 文件说明

| 运营商 | M3U 播放列表 | TXT 播放列表 |
|--------|--------------|--------------|
| 江苏移动 | [js-cmcc.m3u](js-cmcc.m3u) | [js-cmcc.txt](js-cmcc.txt) |
| 江苏电信 | [js-ctcc.m3u](js-ctcc.m3u) | [js-ctcc.txt](js-ctcc.txt) |
| 江苏联通 | [js-cucc.m3u](js-cucc.m3u) | [js-cucc.txt](js-cucc.txt) |

> 文件由 GitHub Actions 自动更新，每5小时检查一次。
EOF

    - name: Commit Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        git pull --rebase --autostash origin main || git rebase --abort

        git add js-cmcc.m3u js-cmcc.txt js-ctcc.m3u js-ctcc.txt js-cucc.m3u js-cucc.txt README.md

        if git diff --cached --quiet; then
          echo "没有文件变更，跳过提交"
          exit 0
        fi

        git commit -m "更新江苏运营商源 (m3u+txt): ${{ steps.date.outputs.date }}"

    - name: Push Update
      continue-on-error: true
      run: |
        git push origin HEAD:main || git push --set-upstream origin main
