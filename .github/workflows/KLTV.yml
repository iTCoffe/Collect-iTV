name: KLTV Daily Update

on:
  workflow_dispatch:
  watch:
    types: [started]
  schedule:
    - cron: '30 0-23/3 * * *'

env:
  TZ: Asia/Shanghai

jobs:
  Update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: GetTime
      id: date
      run: echo "date=$(date +'%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_OUTPUT

    - name: Update Files
      run: |
        export LC_ALL=C.UTF-8

        # --- 1. 处理 KuTV (Jsnzkpg) ---
        wget -q https://raw.githubusercontent.com/Jsnzkpg/Jsnzkpg/Jsnzkpg/Jsnzkpg1.m3u -O Base1.m3u
        tr -d '\r' < Base1.m3u > Base_clean.m3u

        tail -n +2 Base_clean.m3u | awk '/^#EXTINF:/ { inf=$0; getline url; if (inf ~ /央视/ && inf !~ /✈️TG频道@stymei1/) print inf "\n" url }' > CCTV.m3u
        tail -n +2 Base_clean.m3u | awk '/^#EXTINF:/ { inf=$0; getline url; if (inf !~ /央视/ && inf !~ /✈️TG频道@stymei1/) print inf "\n" url }' > CNTV.m3u

        # 写入 KuTV 头部和温馨提示
        echo '#EXTM3U x-tvg-url="https://itv.sspai.indevs.in/epg.xml.gz" catchup="append" catchup-source="?playseek=${(b)yyyyMMddHHmmss}-${(e)yyyyMMddHHmmss}"' > KuTV.m3u
        echo '#EXTINF:-1 tvg-id="温馨提示" tvg-name="温馨提示" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/温馨提示.png" group-title="🦧温馨提示",温馨提示' >> KuTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> KuTV.m3u
        echo '#EXTINF:-1 tvg-id="谨防诈骗" tvg-name="谨防诈骗" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/谨防诈骗.png" group-title="🦧温馨提示",谨防诈骗' >> KuTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> KuTV.m3u
        echo '#EXTINF:-1 tvg-id="禁止蕉绿" tvg-name="禁止蕉绿" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/禁止蕉绿.png" group-title="🦧温馨提示",禁止蕉绿' >> KuTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> KuTV.m3u
        echo '#EXTINF:-1 tvg-id="Cloudflare TV" tvg-name="Cloudflare TV" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/CloudflareTV.png" group-title="🦧温馨提示",Cloudflare TV' >> KuTV.m3u
        echo 'https://cloudflare.tv/hls/live.m3u8' >> KuTV.m3u
        
        cat CCTV.m3u CNTV.m3u >> KuTV.m3u

        # 生成 KuTV.txt
        awk -F ',' '/^#EXTINF:/ { sub(/^#EXTINF:-1 [^,]+,/, "", $0); name=$0; getline url; gsub(/[ \r]/, "", name); gsub(/\r/, "", url); if (name != "" && url != "") print name "," url; }' KuTV.m3u | awk '!c[$0]++' > KuTV.txt

        # --- 2. 处理 LiTV (suxuang) ---
        wget -q https://raw.githubusercontent.com/suxuang/myIPTV/main/ipv4.m3u -O LiTV_Base.m3u
        tr -d '\r' < LiTV_Base.m3u > LiTV_clean.m3u

        # 写入 LiTV 头部和温馨提示（与 KuTV 保持一致）
        echo '#EXTM3U x-tvg-url="https://itv.sspai.indevs.in/epg.xml.gz" catchup="append" catchup-source="?playseek=${(b)yyyyMMddHHmmss}-${(e)yyyyMMddHHmmss}"' > LiTV.m3u
        echo '#EXTINF:-1 tvg-id="温馨提示" tvg-name="温馨提示" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/温馨提示.png" group-title="🦧温馨提示",温馨提示' >> LiTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> LiTV.m3u
        echo '#EXTINF:-1 tvg-id="谨防诈骗" tvg-name="谨防诈骗" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/谨防诈骗.png" group-title="🦧温馨提示",谨防诈骗' >> LiTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> LiTV.m3u
        echo '#EXTINF:-1 tvg-id="禁止蕉绿" tvg-name="禁止蕉绿" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/禁止蕉绿.png" group-title="🦧温馨提示",禁止蕉绿' >> LiTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> LiTV.m3u
        echo '#EXTINF:-1 tvg-id="Cloudflare TV" tvg-name="Cloudflare TV" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/CloudflareTV.png" group-title="🦧温馨提示",Cloudflare TV' >> LiTV.m3u
        echo 'https://cloudflare.tv/hls/live.m3u8' >> LiTV.m3u
        
        tail -n +2 LiTV_clean.m3u >> LiTV.m3u

        # 生成 LiTV.txt
        awk -F ',' '/^#EXTINF:/ { sub(/^#EXTINF:-1 [^,]+,/, "", $0); name=$0; getline url; gsub(/[ \r]/, "", name); gsub(/\r/, "", url); if (name != "" && url != "") print name "," url; }' LiTV.m3u | awk '!c[$0]++' > LiTV.txt

        # --- 3. 清理与更新 README ---
        rm -f Base1.m3u Base_clean.m3u CCTV.m3u CNTV.m3u LiTV_Base.m3u LiTV_clean.m3u

        echo -e "# IPTV 自动更新\n\n### 更新于 ${{ steps.date.outputs.date }}\n\n#### KuTV 直播源\n- [M3U](KuTV.m3u)\n- [TXT](KuTV.txt)\n\n#### LiTV 直播源\n- [M3U](LiTV.m3u)\n- [TXT](LiTV.txt)" > README.md

    - name: Commit Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git pull --rebase --autostash origin main || git rebase --abort
        git add KuTV.m3u KuTV.txt LiTV.m3u LiTV.txt README.md
        if git diff --cached --quiet; then
          echo "No changes detected"
          exit 0
        fi
        git commit -m "IPTV更新: ${{ steps.date.outputs.date }}"

    - name: Push Update
      continue-on-error: true
      run: git push origin HEAD:main
