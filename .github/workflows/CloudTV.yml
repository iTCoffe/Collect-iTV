name: CloudTV Daily Update

on:
  workflow_dispatch:
  watch:
    types: [started]
  schedule:
    - cron: '30 0-23/5 * * *'

env:
  TZ: Asia/Shanghai

jobs:
  Update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: GetTime
      id: date
      run: echo "date=$(date +'%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_OUTPUT

    - name: Update Files
      run: |
        export LC_ALL=C.UTF-8

        # --- 定义温馨提示函数，减少冗余代码 ---
        add_tips() {
          local file=$1
          echo '#EXTINF:-1 tvg-id="温馨提示" tvg-name="温馨提示" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/温馨提示.png" group-title="🦧温馨提示",温馨提示' >> "$file"
          echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> "$file"
          echo '#EXTINF:-1 tvg-id="谨防诈骗" tvg-name="谨防诈骗" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/谨防诈骗.png" group-title="🦧温馨提示",谨防诈骗' >> "$file"
          echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> "$file"
          echo '#EXTINF:-1 tvg-id="禁止蕉绿" tvg-name="禁止蕉绿" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/禁止蕉绿.png" group-title="🦧温馨提示",禁止蕉绿' >> "$file"
          echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> "$file"
          echo '#EXTINF:-1 tvg-id="Cloudflare TV" tvg-name="Cloudflare TV" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/CloudflareTV.png" group-title="🦧温馨提示",Cloudflare TV' >> "$file"
          echo 'https://cloudflare.tv/hls/live.m3u8' >> "$file"
        }

        # --- 定义提取 TXT 的函数 ---
        gen_txt() {
          local m3u_in=$1
          local txt_out=$2
          awk -F ',' '/^#EXTINF:/ { sub(/^#EXTINF:-1 [^,]+,/, "", $0); name=$0; getline url; gsub(/[ \r]/, "", name); gsub(/\r/, "", url); if (name != "" && url != "") print name "," url; }' "$m3u_in" | awk '!c[$0]++' > "$txt_out"
        }

        # --- 1. 处理 BiTV (zubo-tv) ---
        wget -q https://zubo-tv.yuwell.workers.dev -O BiTV_Base.m3u
        echo '#EXTM3U x-tvg-url="https://itv.sspai.indevs.in/epg.xml.gz" catchup="append" catchup-source="?playseek=${(b)yyyyMMddHHmmss}-${(e)yyyyMMddHHmmss}"' > BiTV.m3u
        add_tips "BiTV.m3u"
        tr -d '\r' < BiTV_Base.m3u | tail -n +2 >> BiTV.m3u
        gen_txt "BiTV.m3u" "BiTV.txt"

        # --- 2. 处理 KeTV (worker-tv) ---
        wget -q http://worker-tv.yuwell.workers.dev -O KeTV_Base.m3u
        echo '#EXTM3U x-tvg-url="https://itv.sspai.indevs.in/epg.xml.gz" catchup="append" catchup-source="?playseek=${(b)yyyyMMddHHmmss}-${(e)yyyyMMddHHmmss}"' > KeTV.m3u
        add_tips "KeTV.m3u"
        tr -d '\r' < KeTV_Base.m3u | tail -n +2 >> KeTV.m3u
        gen_txt "KeTV.m3u" "KeTV.txt"

        # --- 3. 处理 MiTV (migu-tv) ---
        wget -q https://migu-tv.yuwell.workers.dev -O MiTV_Base.m3u
        echo '#EXTM3U x-tvg-url="https://itv.sspai.indevs.in/epg.xml.gz" catchup="append" catchup-source="?playseek=${(b)yyyyMMddHHmmss}-${(e)yyyyMMddHHmmss}"' > MiTV.m3u
        add_tips "MiTV.m3u"
        tr -d '\r' < MiTV_Base.m3u | tail -n +2 >> MiTV.m3u
        gen_txt "MiTV.m3u" "MiTV.txt"

        # --- 4. 清理并生成 README ---
        rm -f *_Base.m3u
        
        echo -e "# IPTV 自动更新\n\n### 更新于 ${{ steps.date.outputs.date }}\n\n#### BiTV (Zubo)\n- [M3U](BiTV.m3u) | [TXT](BiTV.txt)\n\n#### KeTV (Worker)\n- [M3U](KeTV.m3u) | [TXT](KeTV.txt)\n\n#### MiTV (Migu)\n- [M3U](MiTV.m3u) | [TXT](MiTV.txt)" > README.md

    - name: Commit Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git pull --rebase --autostash origin main || git rebase --abort
        git add BiTV.m3u BiTV.txt KeTV.m3u KeTV.txt MiTV.m3u MiTV.txt README.md
        
        if git diff --cached --quiet; then
          echo "No changes detected"
          exit 0
        fi
        git commit -m "IPTV多源更新: ${{ steps.date.outputs.date }}"

    - name: Push Update
      continue-on-error: true
      run: git push origin HEAD:main
