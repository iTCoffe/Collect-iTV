name: ERW Update
on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '30 2,8,15,21 * * *'

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0  # 获取完整提交历史

    - name: Update ERW Files
      id: update
      run: |
        # 使用临时文件避免部分下载
        temp_file=$(mktemp)
        
        # 下载源文件
        wget -nv -O "$temp_file" http://47.119.24.76:59093/playback.xml
        
        # 检查文件是否有效（非空且包含XML声明）
        if [ -s "$temp_file" ] && grep -q '<?xml' "$temp_file"; then
          # 替换 URL
          sed -i 's|Tak|精準導航·咪視盡享|g' "$temp_file"
          sed -i 's|http://192.168.1.40:59093|https://i叚娤.倖鍢.net.cn|g' "$temp_file"
          
          # 只在内容变更时更新
          if ! cmp -s "$temp_file" erw.xml; then
            mv "$temp_file" erw.xml
            echo "changed=true" >> $GITHUB_ENV
          else
            echo "内容未变化，跳过更新"
            rm -f "$temp_file"
          fi
        else
          echo "::error::下载的文件无效或为空"
          rm -f "$temp_file"
          exit 1
        fi

    # 新增步骤：当 erw.xml 有更新时，生成对应的 gzip 压缩包
    - name: Compress ERW file
      if: ${{ env.changed == 'true' }}
      run: gzip -c erw.xml > erw.xml.gz

    - name: 提交更改
      if: ${{ env.changed == 'true' }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        # 同时添加 XML 和压缩文件
        git add erw.xml erw.xml.gz
        git commit -m "ERW更新: $(date +'%Y-%m-%d %H:%M:%S')"

    - name: Push changes
      if: ${{ env.changed == 'true' }}
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        force: false
