name: ERW Update
on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '10 18,0,7,13 * * *'

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Update erw Files
      id: update
      run: |
        temp_file=$(mktemp)
        wget -nv -O "$temp_file" https://raw.githubusercontent.com/develop202/migu_video/main/playback.xml

        if [ -s "$temp_file" ] && grep -q '<?xml' "$temp_file"; then
          sed -i 's|Tak|精準導航·咪咕盡享|g' "$temp_file"
          sed -i 's|https://github.com/develop202/migu_video|https://i叚娤.倖鍢.net.cn|g' "$temp_file"

          if ! cmp -s "$temp_file" erw.xml; then
            mv "$temp_file" erw.xml
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_ENV   # 兼容旧方式
          else
            echo "内容未变化，跳过更新"
            rm -f "$temp_file"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "::error::下载的文件无效或为空"
          rm -f "$temp_file"
          exit 1
        fi

    - name: Generate gz archive
      if: steps.update.outputs.changed == 'true'
      run: |
        echo "开始生成 erw.xml.gz"
        gzip -c erw.xml > erw.xml.gz
        ls -lh erw.xml.gz
        echo "生成完成"

    - name: 提交更改
      if: steps.update.outputs.changed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add erw.xml erw.xml.gz
        git status
        git commit -m "erw更新: $(date +'%Y-%m-%d %H:%M:%S')"

    - name: Push changes
      if: steps.update.outputs.changed == 'true'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        force: false
