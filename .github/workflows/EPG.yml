name: EPG Update
on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 1,7,13,19 * * *'

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0  # 获取完整提交历史

    - name: Update EPG Files
      id: update
      run: |
        # 定义下载源列表
        declare -A epg_sources=(
          ["source1"]="http://epg.51zmt.top:8000/e1.xml"
          ["source2"]="https://epg.zsdc.eu.org/t.xml"
        )
        
        # 设置成功标志
        download_success=false
        
        # 尝试从各个源下载，直到成功一个
        for source_name in "${!epg_sources[@]}"; do
          source_url="${epg_sources[$source_name]}"
          echo "尝试从 $source_name ($source_url) 下载..."
          
          temp_file=$(mktemp)
          
          # 下载源文件，增加超时和重试设置
          if wget -nv -T 30 --tries=2 -O "$temp_file" "$source_url"; then
            # 检查文件是否有效（非空且包含XML声明）
            if [ -s "$temp_file" ] && grep -q '<?xml' "$temp_file"; then
              echo "✓ 成功从 $source_name 下载有效文件"
              download_success=true
              
              # 替换旧版 URL (兼容性处理)
              sed -i 's|https://epg.51zmt.top:8000|https://i叚娤.倖鍢.net.cn|g' "$temp_file"
              sed -i 's|http://epg.51zmt.top:8000|https://i叚娤.倖鍢.net.cn|g' "$temp_file"
              
              # 替换描述文本
              sed -i 's|老张的EPG|精準導航·盡享觀看|g' "$temp_file"
              
              # 针对第二个源可能需要的额外替换
              if [ "$source_name" == "source2" ]; then
                echo "应用 source2 特定的替换规则..."
                sed -i 's|zsdc.eu.org|i叚娤.倖鍢.net.cn|g' "$temp_file"
              fi
              
              break
            else
              echo "✗ 从 $source_name 下载的文件无效或为空"
              rm -f "$temp_file"
            fi
          else
            echo "✗ 无法从 $source_name 下载"
            rm -f "$temp_file"
          fi
        done
        
        # 检查是否成功下载了有效文件
        if [ "$download_success" != true ]; then
          echo "::error::所有下载源均失败，无法更新 EPG 文件"
          exit 1
        fi
        
        # 只在内容变更时更新
        if ! cmp -s "$temp_file" epg.xml; then
          mv "$temp_file" epg.xml
          echo "changed=true" >> $GITHUB_ENV
          echo "文件已更新"
        else
          echo "内容未变化，跳过更新"
          rm -f "$temp_file"
        fi

    - name: 提交更改
      if: ${{ env.changed == 'true' }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add epg.xml
        git commit -m "EPG更新: $(date +'%Y-%m-%d %H:%M:%S')"
        echo "提交成功"

    - name: Push changes
      if: ${{ env.changed == 'true' }}
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        force: false
