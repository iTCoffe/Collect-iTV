name: EPG Update
on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '25 23,5,11 * * *'

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Update EPG Files
      id: update
      run: |
        temp_file=$(mktemp)
        wget -nv -O "$temp_file" https://raw.githubusercontent.com/suzukua/epg/hidden/t.xml

        if [ -s "$temp_file" ] && grep -q '<?xml' "$temp_file"; then
          sed -i 's|https://github.com/taksssss/iptv-tool|https://i叚娤.倖鍢.net.cn|g' "$temp_file"
          sed -i 's|Tak|精準導航·盡享觀看|g' "$temp_file"

          if ! cmp -s "$temp_file" epg.xml; then
            mv "$temp_file" epg.xml
            echo "changed=true" >> $GITHUB_ENV
          else
            echo "内容未变化，跳过更新"
            rm -f "$temp_file"
          fi
        else
          echo "::error::下载的文件无效或为空"
          rm -f "$temp_file"
          exit 1
        fi

    - name: Generate gz archive
      if: ${{ env.changed == 'true' }}
      run: |
        gzip -c epg.xml > epg.xml.gz
        echo "已生成 epg.xml.gz"

    - name: 提交更改
      if: ${{ env.changed == 'true' }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add epg.xml epg.xml.gz
        git commit -m "EPG更新: $(date +'%Y-%m-%d %H:%M:%S')"

    - name: Push changes
      if: ${{ env.changed == 'true' }}
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        force: false
