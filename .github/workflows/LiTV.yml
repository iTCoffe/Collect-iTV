name: LiTV Daily Update

on:
  workflow_dispatch:
  watch:
    types: [started]
  schedule:
    - cron: '36 */4 * * *' 

env:
  TZ: Asia/Shanghai

jobs:
  Update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: GetTime
      id: date
      run: echo "date=$(date +'%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_OUTPUT

    - name: Update Files
      run: |
        # 设置字符编码
        export LC_ALL=C.UTF-8

        # 下载基础源文件
        wget -q https://raw.githubusercontent.com/zilong7728/Collect-IPTV/main/best_sorted.m3u -O Base1.m3u

        # 将基础源中的 tvg-logo 域名替换为新域名
        sed -i 's|https://live.fanmingming.cn/tv/|https://logo.jsdelivr.dpdns.org/tv/|g' Base1.m3u

        # 生成最终M3U：写入自定义头部
        echo '#EXTM3U x-tvg-url="https://itv.sspai.pp.ua/epg.xml.gz" catchup="append" catchup-source="?playseek=${(b)yyyyMMddHHmmss}-${(e)yyyyMMddHHmmss}"' > LiTV.m3u

        # 添加自定义提示 (温馨提示)
        echo '#EXTINF:-1 tvg-id="温馨提示" tvg-name="温馨提示" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/温馨提示.png" group-title="🦧温馨提示",温馨提示' >> LiTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> LiTV.m3u

        # 添加新增提示 (谨防诈骗)
        echo '#EXTINF:-1 tvg-id="谨防诈骗" tvg-name="谨防诈骗" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/谨防诈骗.png" group-title="🦧温馨提示",谨防诈骗' >> LiTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> LiTV.m3u

        # 添加新增提示 (禁止蕉绿)
        echo '#EXTINF:-1 tvg-id="禁止蕉绿" tvg-name="禁止蕉绿" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/禁止蕉绿.png" group-title="🦧温馨提示",禁止蕉绿' >> LiTV.m3u
        echo 'https://icloud.ifanr.pp.ua/温馨提示.mp4' >> LiTV.m3u

        # 添加Cloudflare TV
        echo '#EXTINF:-1 tvg-id="Cloudflare TV" tvg-name="Cloudflare TV" tvg-logo="https://logo.jsdelivr.dpdns.org/tv/CloudflareTV.png" group-title="🦧温馨提示",Cloudflare TV' >> LiTV.m3u
        echo 'https://cloudflare.tv/hls/live.m3u8' >> LiTV.m3u

        # 追加处理过的原始源的剩余内容（跳过第一行，保留完整顺序）
        tail -n +2 Base1.m3u >> LiTV.m3u

        # 生成按 group-title 分组的 TXT 播放列表
        awk '
          BEGIN { OFS="," }
          /^#EXTINF:/ {
              # 提取 group-title
              gtitle = "";
              if (match($0, /group-title="([^"]+)"/)) {
                  gtitle = substr($0, RSTART+13, RLENGTH-14);
              }
              # 提取频道名（最后一个逗号后面）
              last_comma = index($0, ",")
              while (index(substr($0, last_comma+1), ",") > 0) {
                  last_comma = last_comma + index(substr($0, last_comma+1), ",")
              }
              name = substr($0, last_comma+1)
              gsub(/^[ \t]+|[ \t]+$/, "", name)
              getline url
              gsub(/\r/, "", url)
              if (name != "" && url != "") {
                  if (gtitle == "") gtitle = "其他"
                  # 去重 key
                  key = gtitle "\x1F" name "\x1F" url
                  if (!seen[key]) {
                      seen[key] = 1
                      groups[gtitle] = 1
                      data[gtitle][name] = url
                  }
              }
          }
          END {
              # 按分组名排序
              n = asorti(groups, sorted_groups)
              for (i = 1; i <= n; i++) {
                  g = sorted_groups[i]
                  print "# " g > "LiTV.txt"
                  # 组内按频道名排序
                  m = asorti(data[g], sorted_names)
                  for (j = 1; j <= m; j++) {
                      name = sorted_names[j]
                      print name "," data[g][name] >> "LiTV.txt"
                  }
                  print "" >> "LiTV.txt"
              }
          }
        ' LiTV.m3u

        # 清理临时文件
        rm -f Base1.m3u

        # 更新README
        echo -e "# IPTV 自动更新\n\n### 更新于 ${{ steps.date.outputs.date }}\n\n### 包含格式:\n- [M3U播放列表](LiTV.m3u)（LiTV.M3U）\n- [分组TXT播放列表](LiTV.txt)（按频道分组）" > README.md

    - name: Commit Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add LiTV.m3u LiTV.txt README.md
        git commit -m "${{ steps.date.outputs.date }}"
        git push
